services:
  - type: web
    name: sap-technologies-ug
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://saptechug.com
      - key: FRONTEND_URL
        value: https://saptechug.com
      - key: PRODUCTION_CLIENT_URL
        value: https://saptechug.com
      - key: API_PUBLIC_URL
        value: https://sap-technologies-ug.onrender.com
      - key: EMAIL_FROM_NAME
        value: SAPTech Uganda
      - key: EMAIL_FROM_ADDRESS
        value: info@saptechug.com
      - key: EMAIL_REPLY_TO
        value: info@saptechug.com
      - key: COMPANY_EMAIL
        value: info@saptechug.com
      - key: COMPANY_LEGAL_NAME
        value: SAPTech Uganda
      - key: COMPANY_PHONE
        value: +256706564628
      - key: COMPANY_ADDRESS
        value: Ndejje, Kampala, Uganda
      - key: AWARDS_BRAND_NAME
        value: SAPTech Awards 2026
      - key: ALLOWED_ORIGINS
        value: https://saptechug.com,https://www.saptechug.com,https://sap-technologies.com,https://www.sap-technologies.com
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SETUP_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_SECONDARY_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
